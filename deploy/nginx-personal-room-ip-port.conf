# Personal room temporary IP deployment.
#
# Use this only when port 80 is already occupied by the existing customer-agent site.
# Public URL:
#   http://106.52.232.205:3001
#
# Recommended layout:
#   Nginx listens on public :3001
#   Next.js app listens on local 127.0.0.1:3002
#
# Then deploy the service with:
#   PORT=3002 ./deploy/install-or-update.sh

server {
    listen 0.0.0.0:3001;
    server_name _;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}

